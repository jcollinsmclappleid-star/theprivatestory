<!DOCTYPE html>
<html>
<head><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 80px; padding: 40px; }
.col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
h2 { color: rgba(255,255,255,0.45); font-family: sans-serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
.sizes { display: flex; align-items: flex-end; gap: 16px; }
.sz { display: flex; flex-direction: column; align-items: center; gap: 6px; color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 9px; }
.browser { display: flex; align-items: center; gap: 8px; background: #1e2030; padding: 8px 14px; border-radius: 6px; margin-top: 8px; color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 12px; }
</style></head>
<body>
  <div class="col">
    <h2>Gold "P" mark — SVG (browser tab)</h2>
    <div class="sizes">
      <div class="sz"><img src="/favicon.svg" width="96" height="96"><span>96×96</span></div>
      <div class="sz"><img src="/favicon.svg" width="48" height="48"><span>48×48</span></div>
      <div class="sz"><img src="/favicon.svg" width="32" height="32"><span>32×32</span></div>
      <div class="sz"><img src="/favicon.svg" width="16" height="16"><span>16×16</span></div>
    </div>
    <div class="browser">
      <img src="/favicon.svg" width="16" height="16">
      <span>theprivatestory.com</span>
    </div>
  </div>

  <div class="col">
    <h2>Logo crop — PNG (Apple touch / fallback)</h2>
    <div class="sizes">
      <div class="sz"><img src="/favicon-square.png" width="96" height="96"><span>96×96</span></div>
      <div class="sz"><img src="/favicon-square.png" width="48" height="48"><span>48×48</span></div>
      <div class="sz"><img src="/favicon-square.png" width="32" height="32"><span>32×32</span></div>
      <div class="sz"><img src="/favicon-square.png" width="16" height="16"><span>16×16</span></div>
    </div>
    <div class="browser">
      <img src="/favicon-square.png" width="16" height="16">
      <span>theprivatestory.com</span>
    </div>
  </div>
</body>
</html>
