        <h1>The Private Story — Personalised AI Audio Stories</h1>
        <p>AI-written romantic and intimate audio stories, created around your choices and private to you alone. No social features. No history shared. Every story yours from the first word.</p>
      </header>
      <article>
        <h2>What is The Private Story?</h2>
        <p>The Private Story is an AI-powered audio storytelling platform that writes personalised romantic and intimate audio stories tailored entirely to your choices. Every story is private to your account — no social sharing, no public history, no recommendations fed to others. Heard only by you.</p>
        <p>A subscription audio service that uses large language models and professional ElevenLabs narration to generate original literary erotica and intimate romance audio, created from scratch around your selected mood, cast, intensity, and scenario. Stories are 10–25 minutes of narrated audio.</p>
        <h2>Who is it for?</h2>
        <p>Adults 18 and over who want private, agency-led storytelling — not a catalogue to browse, but a story built for them. Designed with women as the primary audience, though open to all adults.</p>
        <h2>Pricing</h2>
        <ul>
          <li>Monthly plan — £29/month, includes 5 story generations</li>
          <li>Annual plan — £179/year, includes 50 story generations</li>
          <li>Story add-on — £3.99 per additional story</li>
          <li>Immersive one-time entry — £7.99 for single access</li>
        </ul>
        <h2>Privacy</h2>
        <p>No story content, listening history, or preferences are shared with other users or used in public recommendations. Confirmation of age is stored only on your device. Account data is managed by Ianson System Ltd t/a The Private Story.</p>
