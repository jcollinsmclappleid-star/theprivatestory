        <p>The Private Story is a personalised audio storytelling platform that creates romantic and intimate audio stories tailored entirely to your choices. Every story is private to your account — no social sharing, no public history, no recommendations fed to others. Heard only by you.</p>
        <p>A subscription audio service that generates original literary erotica and intimate romance audio using professional narration, created from scratch around your selected mood, cast, intensity, and scenario. Stories are approximately 10 minutes of narrated audio.</p>
        <h2>Who is it for?</h2>
        <p>Adults 18 and over who want private, agency-led storytelling — not a catalogue to browse, but a story built for them. Designed with women as the primary audience, though open to all adults.</p>
        <h2>Pricing</h2>

        <h2>Privacy</h2>
        <p>No story content, listening history, or preferences are shared with other users or used in public recommendations. Confirmation of age is stored only on your device. Account data is managed by Ianson System Ltd t/a The Private Story.</p>
