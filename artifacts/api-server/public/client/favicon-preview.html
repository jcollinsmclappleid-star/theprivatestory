<!DOCTYPE html>
<html>
<head><style>
body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 60px; flex-wrap: wrap; padding: 30px; box-sizing: border-box; }
.section { display: flex; flex-direction: column; align-items: center; gap: 20px; }
h3 { color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin: 0; }
.row { display: flex; align-items: flex-end; gap: 20px; }
.card { display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 10px; }
img { display: block; border-radius: 20%; }
.browser { display: flex; align-items: center; gap: 8px; background: #2a2a3e; padding: 8px 16px; border-radius: 8px; margin-top: 10px; }
.browser img { border-radius: 4px; }
.browser span { color: rgba(255,255,255,0.6); font-family: sans-serif; font-size: 12px; }
</style></head>
<body>
  <div class="section">
    <h3>Option A — Gold "P" mark (SVG · primary)</h3>
    <div class="row">
      <div class="card">
        <img src="/favicon.svg" width="120" height="120">
        <span>120×120</span>
      </div>
      <div class="card">
        <img src="/favicon.svg" width="48" height="48">
        <span>48×48</span>
      </div>
      <div class="card">
        <img src="/favicon.svg" width="32" height="32">
        <span>32×32</span>
      </div>
      <div class="card">
        <img src="/favicon.svg" width="16" height="16">
        <span>16×16</span>
      </div>
    </div>
    <div class="browser">
      <img src="/favicon.svg" width="16" height="16">
      <span>theprivatestory.com</span>
    </div>
  </div>

  <div class="section">
    <h3>Option B — Logo crop (PNG · fallback + Apple)</h3>
    <div class="row">
      <div class="card">
        <img src="/favicon-square.png" width="120" height="120">
        <span>120×120</span>
      </div>
      <div class="card">
        <img src="/favicon-square.png" width="48" height="48">
        <span>48×48</span>
      </div>
      <div class="card">
        <img src="/favicon-square.png" width="32" height="32">
        <span>32×32</span>
      </div>
      <div class="card">
        <img src="/favicon-square.png" width="16" height="16">
        <span>16×16</span>
      </div>
    </div>
    <div class="browser">
      <img src="/favicon-square.png" width="16" height="16">
      <span>theprivatestory.com</span>
    </div>
  </div>
</body>
</html>
