<!DOCTYPE html>
<html>
<head><style>
body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 48px; flex-wrap: wrap; }
.card { display: flex; flex-direction: column; align-items: center; gap: 10px; color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 11px; letter-spacing: 0.05em; }
img { display: block; border-radius: 20%; }
.browser { display: flex; align-items: center; gap-8px; background: #2a2a3e; padding: 8px 16px; border-radius: 8px; gap: 8px; }
.browser img { border-radius: 4px; }
.browser span { color: rgba(255,255,255,0.6); font-family: sans-serif; font-size: 13px; }
</style></head>
<body>
  <div class="card">
    <img src="/favicon-square.png" width="180" height="180">
    <span>180×180 (Apple Touch)</span>
  </div>
  <div class="card">
    <img src="/favicon-square.png" width="48" height="48">
    <span>48×48</span>
  </div>
  <div class="card">
    <img src="/favicon-square.png" width="32" height="32">
    <span>32×32 (browser tab)</span>
  </div>
  <div class="card">
    <img src="/favicon-square.png" width="16" height="16">
    <span>16×16</span>
  </div>
  <div class="browser">
    <img src="/favicon-square.png" width="16" height="16">
    <span>theprivatestory.com</span>
  </div>
</body>
</html>
